<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title th:text="${department.id != null ? 'Edit Department' : 'Add Department'}">Department</title>
</head>

<body>
    <div layout:fragment="title" th:text="${department.id != null ? 'Edit Department' : 'Add New Department'}">Add New
        Department</div>

    <div layout:fragment="content">
        <div class="card" style="max-width: 600px; margin: 0 auto; padding: 0; overflow: hidden;">
            <div
                style="background: var(--grad-primary); padding: 2rem; color: white; display: flex; align-items: center; gap: 1rem;">
                <div
                    style="width: 48px; height: 48px; border-radius: 12px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                    <i class="fas fa-building-columns"></i>
                </div>
                <div>
                    <h2 style="margin: 0; font-size: 1.4rem; font-weight: 800; font-family: 'Outfit', sans-serif;"
                        th:text="${department.id != null ? 'Edit Department' : 'Add New Department'}">Add New Department
                    </h2>
                    <p style="margin: 0.2rem 0 0 0; font-size: 0.9rem; opacity: 0.9;">Configure academic department
                        details</p>
                </div>
            </div>
            <div style="padding: 2rem;">
                <form th:action="@{/admin/departments/new}" th:object="${department}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Department Name</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. Computer Science"
                            required
                            style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit;">
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Department Code</label>
                        <input type="text" th:field="*{code}" class="form-control" placeholder="e.g. CSE" required
                            style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit;">
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Max Years</label>
                            <input type="number" th:field="*{maxYears}" class="form-control" required min="1" max="10"
                                style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Max
                                Semesters</label>
                            <input type="number" th:field="*{maxSemesters}" class="form-control" required min="1"
                                max="20"
                                style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit;">
                        </div>
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center;">
                            <i class="fas fa-save"></i> Save Department
                        </button>
                        <a th:href="@{/admin/departments}" class="btn"
                            style="flex: 1; justify-content: center; background: #f1f5f9; color: var(--text-main);">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
