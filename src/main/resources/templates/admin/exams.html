<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Exam Management</title>
</head>

<body>
    <div layout:fragment="title">Exam Scheduling</div>

    <div layout:fragment="content">
        <div class="card">
            <h2 style="margin-top: 0; font-size: 1.25rem; margin-bottom: 1.5rem;">Schedule New Exam</h2>

            <form action="#" method="post">
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Subject</label>
                        <input type="text" class="form-control" placeholder="e.g., Data Structures"
                            style="background: white; color: black; border: 1px solid #cbd5e1;" required>
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Date & Time</label>
                        <input type="datetime-local" class="form-control"
                            style="background: white; color: black; border: 1px solid #cbd5e1;" required>
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Target Batch</label>
                        <select class="form-control" style="background: white; color: black; border: 1px solid #cbd5e1;"
                            required>
                            <option th:each="b : ${batches}" th:value="${b.id}"
                                th:text="${b.name + ' (' + b.department.name + ')'}"></option>
                        </select>
                    </div>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Venue</label>
                    <input type="text" class="form-control" placeholder="e.g., Examination Hall A"
                        style="background: white; color: black; border: 1px solid #cbd5e1;" required>
                </div>
                <button type="submit" class="btn btn-primary">Schedule Exam</button>
            </form>
        </div>
    </div>
</body>

</html>
