<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Batch Form - SmartCampus</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="card" style="max-width: 600px; margin: 0 auto; padding: 0; overflow: hidden;">
            <div
                style="background: var(--grad-emerald); padding: 2rem; color: white; display: flex; align-items: center; gap: 1rem;">
                <div
                    style="width: 48px; height: 48px; border-radius: 12px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                    <i class="fas fa-layer-group"></i>
                </div>
                <div>
                    <h2 style="margin: 0; font-size: 1.4rem; font-weight: 800; font-family: 'Outfit', sans-serif;"
                        th:text="${batch.id == null ? 'Add New Batch' : 'Edit Batch'}">Add New Batch</h2>
                    <p style="margin: 0.2rem 0 0 0; font-size: 0.9rem; opacity: 0.9;">Configure academic batch duration
                        and details</p>
                </div>
            </div>
            <div style="padding: 2rem;">

                <form th:action="@{/admin/batches/new}" th:object="${batch}" method="post">
                    <input type="hidden" th:field="*{id}" />

                    <div class="form-group">
                        <label class="form-label">Department</label>
                        <select th:field="*{department.id}" class="form-control" id="deptSelect" required>
                            <option value="">Select Department</option>
                            <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"
                                th:data-max-years="${dept.maxYears}" th:data-max-semesters="${dept.maxSemesters}">
                            </option>
                        </select>
                        <p id="deptHint"
                            style="font-size: 0.8rem; color: var(--text-success); margin-top: 0.4rem; display: none;">
                            <i class="fas fa-info-circle"></i> This department typically has <span
                                id="hintYears">?</span> years and <span id="hintSems">?</span> semesters.
                        </p>
                    </div>

                    <script>
                        document.getElementById('deptSelect').addEventListener('change', function () {
                            const selectedOption = this.options[this.selectedIndex];
                            const hint = document.getElementById('deptHint');
                            if (selectedOption.value) {
                                document.getElementById('hintYears').textContent = selectedOption.getAttribute('data-max-years');
                                document.getElementById('hintSems').textContent = selectedOption.getAttribute('data-max-semesters');
                                hint.style.display = 'block';
                            } else {
                                hint.style.display = 'none';
                            }
                        });
                    </script>

                    <div class="form-group">
                        <label class="form-label">Start Year</label>
                        <input type="number" name="startYear" class="form-control"
                            th:value="${startYear != null ? startYear : 2026}" min="2000" max="2100" required />
                        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.4rem;">
                            The year the students joined the college.
                        </p>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Duration</label>
                        <select name="duration" class="form-control" required>
                            <option value="4" th:selected="${duration == 4}">4 Years (Standard Degree)</option>
                            <option value="3" th:selected="${duration == 3}">3 Years (Lateral Entry/Diploma)</option>
                            <option value="2" th:selected="${duration == 2}">2 Years (Post Graduate)</option>
                        </select>
                        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.4rem;">
                            The batch name will be generated as (Start Year)-(Start Year + Duration).
                        </p>
                    </div>

                    <div
                        style="display: flex; gap: 1rem; margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                        <button type="submit" class="btn btn-primary" style="flex: 1;">
                            <i class="fas fa-save"></i> Save Batch
                        </button>
                        <a th:href="@{/admin/batches}" class="btn btn-outline" style="flex: 1;">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
