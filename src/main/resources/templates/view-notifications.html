<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>My Notifications</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="h3 mb-0 text-gray-800" th:text="${viewingArchived ? 'Cleared Notifications' : 'My Notifications'}">My Notifications</h2>
                    <p class="text-muted" th:text="${viewingArchived ? 'Deleted notifications kept for your reference' : 'Keep track of updates and announcements'}">Keep track of updates and announcements</p>
                </div>
                <div class="d-flex gap-2">
                    <a th:if="${!viewingArchived}" th:href="@{/notifications(archived=true)}" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-archive me-1"></i> View Cleared
                    </a>
                    <a th:if="${viewingArchived}" th:href="@{/notifications}" class="btn btn-outline-primary btn-sm">
                        <i class="fas fa-inbox me-1"></i> Back to Inbox
                    </a>
                    <div th:if="${!viewingArchived and notifications != null and !notifications.empty}">
                        <form th:action="@{/notifications/clear-all}" method="post">
                            <button type="submit" class="btn btn-danger btn-sm" id="btnClearAll">
                                <i class="fas fa-trash-sweep me-1"></i> Clear All Inbox
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="card shadow mb-4">
                <div class="card-body p-0">
                    <div th:if="${notifications == null or notifications.empty}" class="text-center py-5">
                        <i class="fas fa-bell-slash fa-3x text-gray-300 mb-3"></i>
                        <p class="text-muted" th:text="${viewingArchived ? 'No cleared notifications found' : 'You have no notifications yet'}">You have no notifications yet</p>
                    </div>

                    <div class="list-group list-group-flush" th:if="${notifications != null and !notifications.empty}">
                        <div th:each="note : ${notifications}" 
                             class="list-group-item list-group-item-action p-4 border-start border-4"
                             th:classappend="${note.read ? 'border-light' : (note.type == 'SUCCESS' ? 'border-success' : (note.type == 'WARNING' ? 'border-warning' : 'border-info'))}">
                            
                            <div class="d-flex justify-content-between align-items-start">
                                <div class="d-flex gap-3">
                                    <div class="rounded-circle d-flex align-items-center justify-content-center p-3"
                                         th:classappend="${note.type == 'SUCCESS' ? 'bg-success bg-opacity-10 text-success' : (note.type == 'WARNING' ? 'bg-warning bg-opacity-10 text-warning' : 'bg-info bg-opacity-10 text-info')}"
                                         style="width: 48px; height: 48px;">
                                        <i th:class="${note.type == 'SUCCESS' ? 'fas fa-check-circle fs-4' : (note.type == 'WARNING' ? 'fas fa-exclamation-triangle fs-4' : 'fas fa-info-circle fs-4')}"></i>
                                    </div>
                                    <div>
                                        <h5 class="mb-1 fw-bold" th:text="${note.title}">Title</h5>
                                        <p class="mb-2 text-muted" th:text="${note.message}">Message</p>
                                        <small class="text-muted">
                                            <i class="far fa-clock me-1"></i>
                                            <span th:text="${#temporals.format(note.createdAt, 'EEEE, dd MMMM yyyy HH:mm')}">Date</span>
                                        </small>
                                    </div>
                                </div>
                                <div class="d-flex gap-2">
                                    <div th:if="${!note.read and !viewingArchived}">
                                        <form th:action="@{'/notifications/mark-read/' + ${note.id}}" method="post">
                                            <button type="submit" class="btn btn-sm btn-primary">
                                                Mark as Read
                                            </button>
                                        </form>
                                    </div>
                                    <div th:if="${!viewingArchived}">
                                        <form th:action="@{'/notifications/clear/' + ${note.id}}" method="post">
                                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Clear this notification">
                                                <i class="fas fa-times"></i>
                                            </button>
                                        </form>
                                    </div>
                                    <div th:if="${viewingArchived}">
                                        <button type="button" class="btn btn-sm btn-danger btn-delete-note" title="Delete permanently"
                                                th:data-url="@{'/notifications/delete/' + ${note.id}}"
                                                th:data-title="${note.title}">
                                            <i class="fas fa-trash-alt"></i> Delete
                                        </button>
                                    </div>
                                    <span th:if="${note.read and !viewingArchived}" class="badge bg-light text-dark border d-flex align-items-center">READ</span>
                                    <span th:if="${viewingArchived}" class="badge bg-secondary d-flex align-items-center">ARCHIVED</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Custom Delete Modal -->
        <div id="deleteModal" class="modal">
            <div class="modal-content">
                <div class="text-center mb-4">
                    <div class="rounded-circle bg-danger bg-opacity-10 text-danger d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                        <i class="fas fa-trash-alt fa-3x"></i>
                    </div>
                    <h3 class="h4 fw-bold">Delete Notification?</h3>
                    <p class="text-muted">You are about to permanently delete <br><strong id="modalTitle">this notification</strong>.</p>
                    <p class="small text-danger">This action cannot be undone.</p>
                </div>
                <div class="d-grid gap-2">
                    <form id="deleteForm" method="post">
                        <button type="submit" class="btn btn-danger w-100 py-3 fw-bold">
                            <i class="fas fa-trash-alt me-2"></i> Permanently Delete
                        </button>
                    </form>
                    <button type="button" class="btn btn-outline-secondary w-100 py-3" onclick="hideDeleteModal()">
                        Cancel
                    </button>
                </div>
            </div>
        </div>

        <script>
            function showDeleteModal(actionUrl, title) {
                const modal = document.getElementById('deleteModal');
                const form = document.getElementById('deleteForm');
                const titleSpan = document.getElementById('modalTitle');
                
                form.action = actionUrl;
                titleSpan.textContent = title;
                modal.style.display = 'flex';
                
                // Close on click outside
                modal.onclick = function(event) {
                    if (event.target == modal) hideDeleteModal();
                }
            }

            function hideDeleteModal() {
                document.getElementById('deleteModal').style.display = 'none';
            }
            
            // Close on Escape key
            document.addEventListener('keydown', function(event) {
                if (event.key === "Escape") hideDeleteModal();
            });

            // Initialize delete buttons
            document.addEventListener('DOMContentLoaded', function() {
                const deleteButtons = document.querySelectorAll('.btn-delete-note');
                deleteButtons.forEach(btn => {
                    btn.addEventListener('click', function() {
                        const url = this.getAttribute('data-url');
                        const title = this.getAttribute('data-title');
                        showDeleteModal(url, title);
                    });
                });
            });
        </script>
    </div>
</body>
</html>
