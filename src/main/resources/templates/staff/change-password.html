<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Update Password - SmartCampus</title>
</head>

<body>
    <div layout:fragment="title">Update Password</div>

    <div layout:fragment="content">
        <div th:if="${error}" class="alert alert-danger" style="margin-bottom: 2rem;">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}">Error message</span>
        </div>

        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div class="card-header"
                style="background: var(--grad-sunset); border-radius: var(--radius-xl) var(--radius-xl) 0 0; padding: 1.5rem; margin: -2rem -2rem 1.5rem -2rem; color: white; border-bottom: none;">
                <h2 class="card-title" style="color: white; font-size: 1.5rem; font-weight: 700; margin: 0;">
                    <i class="fas fa-key"
                        style="background: rgba(255,255,255,0.2); padding: 0.5rem; border-radius: 10px; margin-right: 0.5rem;"></i>
                    Change Your Password
                </h2>
            </div>

            <p style="color: var(--text-muted); margin-bottom: 2rem;">
                Keep your account secure by updating your password regularly. 
                Your new password must contain at least <strong>one uppercase letter</strong> and <strong>one special character</strong>.
            </p>

            <form th:action="@{/staff/change-password}" method="post">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-main);">Current Password</label>
                    <div style="position: relative;">
                        <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                        <input type="password" name="oldPassword" required
                            style="width: 100%; padding: 0.8rem 1rem 0.8rem 2.8rem; border: 1px solid var(--border-color); border-radius: 10px; font-family: inherit;">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-main);">New Password</label>
                    <div style="position: relative;">
                        <i class="fas fa-shield-halved" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                        <input type="password" name="newPassword" required
                            style="width: 100%; padding: 0.8rem 1rem 0.8rem 2.8rem; border: 1px solid var(--border-color); border-radius: 10px; font-family: inherit;">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 2rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-main);">Confirm New Password</label>
                    <div style="position: relative;">
                        <i class="fas fa-check-double" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                        <input type="password" name="confirmPassword" required
                            style="width: 100%; padding: 0.8rem 1rem 0.8rem 2.8rem; border: 1px solid var(--border-color); border-radius: 10px; font-family: inherit;">
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; justify-content: flex-end; border-top: 1px solid var(--border-color); padding-top: 2rem;">
                    <a th:href="@{/staff/profile}" class="btn btn-outline" style="padding: 0.8rem 2rem;">Cancel</a>
                    <button type="submit" class="btn btn-primary" style="padding: 0.8rem 2.5rem; background: var(--grad-sunset); border: none;">
                        Update Password
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
