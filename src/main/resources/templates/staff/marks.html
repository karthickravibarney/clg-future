<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Academic Marks Entry - SmartCampus</title>
</head>

<body>
    <div layout:fragment="title">Academic Performance</div>

    <div layout:fragment="content">
        <div class="card">
            <div class="card-header"
                style="background: var(--grad-emerald); border-radius: var(--radius-xl) var(--radius-xl) 0 0; padding: 2rem; margin: -2rem -2rem 1.5rem -2rem; color: white; border-bottom: none;">
                <div style="display: flex; flex-direction: column;">
                    <h2 class="card-title" style="color: white; font-size: 1.8rem; font-weight: 800;"><i
                            class="fas fa-spell-check"
                            style="background: rgba(255,255,255,0.2); padding: 0.5rem; border-radius: 12px; margin-right: 0.5rem;"></i>
                        Examination Marks Entry</h2>
                    <p style="margin: 0.5rem 0 0 0; font-size: 0.95rem; opacity: 0.9;">Record student performance for
                        specific subjects and semesters.</p>
                </div>
            </div>

            <form th:action="@{/staff/marks/save}" method="post">
                <!-- Assessment Metadata -->
                <div
                    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; background: var(--bg-main); padding: 1.5rem; border-radius: var(--radius-md); border: 1px solid var(--border-color);">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">Subject Title</label>
                        <input type="text" name="subject" class="form-control" placeholder="e.g. Data Structures"
                            required>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">Target Semester</label>
                        <select name="semester" class="form-control" required>
                            <option value="" disabled selected>Select Semester</option>
                            <option value="1">First Semester</option>
                            <option value="2">Second Semester</option>
                            <option value="3">Third Semester</option>
                            <option value="4">Fourth Semester</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">Maximum Score</label>
                        <input type="number" name="totalMarks" value="100" class="form-control" required>
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 200px;">Roll Number</th>
                                <th>Student Full Name</th>
                                <th style="text-align: right; width: 180px;">Score Obtained</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="student, iter : ${students}">
                                <td style="font-weight: 600; color: var(--primary); font-family: 'Outfit', sans-serif;"
                                    th:text="${student.rollNumber}">STU001</td>
                                <td>
                                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                                        <div class="user-avatar" style="width: 32px; height: 32px; font-size: 0.8rem;"
                                            th:text="${student.fullName.substring(0, 1).toUpperCase()}">J</div>
                                        <span th:text="${student.fullName}">John Doe</span>
                                    </div>
                                </td>
                                <td style="text-align: right;">
                                    <input type="hidden" th:name="${'marks[' + iter.index + '].studentId'}"
                                        th:value="${student.id}">
                                    <div
                                        style="display: inline-flex; align-items: center; gap: 0.5rem; justify-content: flex-end;">
                                        <input type="number" th:name="${'marks[' + iter.index + '].score'}"
                                            class="form-control"
                                            style="width: 100px; text-align: center; font-weight: 600;" placeholder="0"
                                            required>
                                        <span style="color: var(--text-muted); font-size: 0.8rem;">/ 100</span>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(students)}">
                                <td colspan="3" style="text-align: center; padding: 4rem; color: var(--text-muted);">
                                    No students enrolled in your assigned sections.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div
                    style="margin-top: 2.5rem; display: flex; justify-content: flex-end; padding-top: 2rem; border-top: 1px solid var(--border-color);">
                    <button type="submit" class="btn btn-primary"
                        style="background: #10b981; padding: 1rem 2.5rem; font-weight: 600;">
                        <i class="fas fa-floppy-disk"></i> Finalize & Post Marks
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
