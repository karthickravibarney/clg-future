spring.application.name=erp

# -------------------------------
# DATABASE CONFIG
# -------------------------------
# Default to H2 In-Memory (allows build and dev to work without MySQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# For MySQL Production (Uncomment and set env vars on Render/Server)
# spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:erp_db}?createDatabaseIfNotExist=true
# spring.datasource.username=${DB_USER:root}
# spring.datasource.password=${DB_PASSWORD:}
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# -------------------------------
# FILE UPLOAD CONFIG
# -------------------------------
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# -------------------------------
# SERVER CONFIG (RENDER FIX)
# -------------------------------
server.port=${PORT:8080}
server.address=0.0.0.0

# -------------------------------
# LOGGING
# -------------------------------
logging.level.org.springframework.security=TRACE

# -------------------------------
# ERROR SETTINGS
# -------------------------------
server.error.whitelabel.enabled=false
server.error.include-stacktrace=never

# -------------------------------
# JWT CONFIG
# -------------------------------
erp.jwt.secret=9a4fba3663a89301140089a502e1de7f884aef5aa9de8b71d497c234a41d0ffc8f35c5c8de9359e19e71ecba3a8c1de6c2975927c7a52f9c756b50e30925e0a2
erp.jwt.expiration-ms=86400000
erp.jwt.cookie-name=erp-jwt
